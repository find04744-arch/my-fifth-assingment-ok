<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>GitHub Issues Tracker - Login</title>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-10 rounded-xl shadow-sm border border-gray-200 w-full max-w-md text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" class="w-20 mx-auto mb-6">
        <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mb-8">Sign in to manage your issues</p>

        <form id="loginForm" class="text-left space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" placeholder="Enter Username" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
            </div>
            <button type="submit" class="w-full bg-[#5C00FF] text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Sign In</button>
        </form>

        <div class="my-8 flex items-center before:flex-1 before:border-t before:border-gray-200 after:flex-1 after:border-t after:border-gray-200">
            <span class="px-3 text-gray-400 text-sm italic">OR</span>
        </div>

        <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
            <p class="text-sm text-gray-500 mb-2">Demo Credentials:</p>
            <p class="font-bold text-gray-700">Username: <span class="font-normal">admin</span></p>
            <p class="font-bold text-gray-700">Password: <span class="font-normal">admin123</span></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if(document.getElementById('username').value === 'admin' && document.getElementById('password').value === 'admin123') {
                window.location.href = 'dashboard.html';
            } else { alert('Invalid Login!'); }
        });
    </script>
</body>
</html>
