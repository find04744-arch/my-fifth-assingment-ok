<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .hidden { display: none; }

        /* কার্ডের উপরের মোটা বর্ডার স্টাইল */
        .issue-card-open { 
            border-top: 5px solid #22c55e !important; 
        }
        .issue-card-closed { 
            border-top: 5px solid #9333ea !important; 
        }
        
        .btn-filter {
            padding: 10px 30px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
        }

        .active-all { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5; }
        .active-open { background-color: #22c55e !important; color: white !important; border-color: #22c55e; }
        .active-closed { background-color: #9333ea !important; color: white !important; border-color: #9333ea; }

        .modal-bg {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
        }

        .close-btn {
            background-color: #4f46e5;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 700;
            transition: background 0.2s;
        }
        .close-btn:hover { background-color: #4338ca; }
    </style>
</head>
<body>

    <div id="login-area" class="min-h-screen flex items-center justify-center p-5">
        <div class="bg-white p-10 rounded-[30px] shadow-xl border border-gray-100 w-full max-w-sm text-center">
            <i class="fab fa-github text-6xl mb-6 text-gray-800"></i>
            <h2 class="text-2xl font-extrabold text-gray-800 mb-6 tracking-tight">Login to Tracker</h2>
            <div class="text-left space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <button onclick="startLogin()" class="w-full bg-[#4f46e5] text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 transition shadow-lg">Sign In</button>
            </div>
            <p class="mt-8 text-[10px] text-gray-400 font-bold uppercase tracking-widest">Demo: admin / admin123</p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-white border-b px-8 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-40 shadow-sm">
            <div class="flex items-center gap-2 mb-4 md:mb-0">
                <i class="fab fa-github text-3xl text-gray-800"></i>
                <span class="font-extrabold text-xl tracking-tight text-gray-800">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <div class="relative flex-grow min-w-[300px]">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="find-box" onkeyup="searchMe()" placeholder="Search issues..." class="w-full pl-11 pr-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-indigo-500 bg-gray-50">
                </div>
                <button class="bg-[#4f46e5] text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow hover:bg-indigo-700 transition">+ New Issue</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-8">
            <div class="flex gap-3 mb-10">
                <button id="all" onclick="filterData('all')" class="btn-filter active-all">All</button>
                <button id="open" onclick="filterData('open')" class="btn-filter">Open</button>
                <button id="closed" onclick="filterData('closed')" class="btn-filter">Closed</button>
            </div>

            <div class="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-tasks text-indigo-600 text-xl"></i>
                    </div>
                    <div>
                        <h3 id="info-text" class="text-2xl font-black text-gray-900 leading-none">0 Issues</h3>
                        <p class="text-[12px] text-gray-400 font-bold mt-1 uppercase tracking-wide">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 text-xs font-bold text-gray-500 uppercase">
                    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Open</span>
                    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-purple-600"></span> Closed</span>
                </div>
            </div>

            <div id="card-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="item-modal" class="fixed inset-0 modal-bg hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[24px] w-full max-w-2xl overflow-hidden relative shadow-2xl p-8">
            <div id="modal-data"></div>
        </div>
    </div>

    <script>
        let myData = []; 

        function startLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                getIssues();
            } else { alert("Incorrect credentials!"); }
        }

        async function getIssues() {
            myData = makeFakeData();
            showUI(myData);
        }

        function showUI(dataArray) {
            const list = document.getElementById('card-list');
            document.getElementById('info-text').innerText = dataArray.length + " Issues";
            list.innerHTML = "";

            dataArray.forEach(val => {
                const isOp = val.status === 'open';
                // এখানে স্ট্যাটাস অনুযায়ী ক্লাস সেট করা হচ্ছে
                const borderClass = isOp ? 'issue-card-open' : 'issue-card-closed';
                
                const div = document.createElement('div');
                div.className = `bg-white p-6 rounded-xl shadow-sm border border-gray-100 cursor-pointer transition-all hover:shadow-md ${borderClass}`;
                div.onclick = () => showPopup(val._id);

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <i class="${isOp ? 'far fa-dot-circle text-green-500' : 'fas fa-check-circle text-purple-600'} text-lg"></i>
                        <span class="text-[10px] font-black px-2 py-1 bg-gray-100 text-gray-500 rounded uppercase border border-gray-200">
                            ${val.priority}
                        </span>
                    </div>
                    <h4 class="font-bold text-gray-800 text-[15px] mb-2 leading-snug line-clamp-2">${val.title}</h4>
                    <p class="text-[12px] text-gray-400 mb-5 font-medium line-clamp-2">${val.description}</p>
                    <div class="flex gap-2 mb-6">
                        <span class="bg-red-50 text-red-500 text-[9px] font-black px-2 py-0.5 rounded border border-red-100 uppercase">BUG</span>
                        <span class="bg-orange-50 text-orange-500 text-[9px] font-black px-2 py-0.5 rounded border border-orange-100 uppercase">HELP WANTED</span>
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-50 flex justify-between text-[10px] text-gray-400 font-bold">
                        <span>#${val._id.slice(-5)} by ${val.author}</span>
                        <span>1/15/2024</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function filterData(type) {
            const btns = ['all', 'open', 'closed'];
            btns.forEach(id => {
                document.getElementById(id).classList.remove('active-all', 'active-open', 'active-closed');
            });

            const target = document.getElementById(type);
            if(type === 'all') target.classList.add('active-all');
            if(type === 'open') target.classList.add('active-open');
            if(type === 'closed') target.classList.add('active-closed');

            const filtered = type === 'all' ? myData : myData.filter(i => i.status === type);
            showUI(filtered);
        }

        function searchMe() {
            const word = document.getElementById('find-box').value.toLowerCase();
            const filtered = myData.filter(x => x.title.toLowerCase().includes(word));
            showUI(filtered);
        }

        function showPopup(id) {
            const modal = document.getElementById('item-modal');
            const box = document.getElementById('modal-data');
            const single = myData.find(x => x._id === id);
            
            modal.classList.replace('hidden', 'flex');
            box.innerHTML = `
                <div class="flex flex-col">
                    <h2 class="text-2xl font-black text-gray-900 mb-3">${single.title}</h2>
                    <div class="flex items-center gap-3 mb-6">
                        <span class="${single.status === 'open' ? 'bg-green-500' : 'bg-purple-600'} text-white text-[11px] font-bold px-3 py-1 rounded-full uppercase">${single.status === 'open' ? 'Opened' : 'Closed'}</span>
                        <span class="text-gray-400 text-[12px] font-medium">• Author: ${single.author} • 22/02/2026</span>
                    </div>
                    <div class="flex gap-2 mb-6">
                        <span class="bg-red-50 text-red-500 text-[10px] font-black px-3 py-1 rounded border border-red-100 uppercase">BUG</span>
                        <span class="bg-orange-50 text-orange-400 text-[10px] font-black px-3 py-1 rounded border border-orange-100 uppercase">HELP WANTED</span>
                    </div>
                    <p class="text-gray-600 text-sm leading-relaxed mb-8">
                        ${single.description}
                    </p>
                    <div class="grid grid-cols-2 gap-4 bg-gray-50 p-6 rounded-2xl border border-gray-100">
                        <div>
                            <p class="text-[10px] text-gray-400 font-black uppercase mb-1">Assignee:</p>
                            <p class="font-bold text-gray-800">Fahim Ahmed</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 font-black uppercase mb-1">Priority:</p>
                            <span class="bg-red-500 text-white text-[10px] font-black px-3 py-1 rounded uppercase">${single.priority}</span>
                        </div>
                    </div>
                    <div class="flex justify-end mt-8">
                        <button onclick="hidePopup()" class="close-btn shadow-lg uppercase tracking-wider text-sm">Close</button>
                    </div>
                </div>
            `;
        }

        function hidePopup() { document.getElementById('item-modal').classList.replace('flex', 'hidden'); }

        function makeFakeData() {
            let temp = [];
            for (let i = 1; i <= 50; i++) {
                temp.push({
                    _id: "idx-" + Math.random().toString(36).substr(2, 9),
                    title: i + ". Fix Navigation Menu On Mobile Devices",
                    description: "The navigation menu doesn't collapse properly on mobile devices. Need to fix responsive design issues.",
                    status: i % 2 === 0 ? "open" : "closed",
                    priority: i % 3 === 0 ? "HIGH" : i % 2 === 0 ? "MEDIUM" : "LOW",
                    author: "john_doe"
                });
            }
            return temp;
        }
    </script>
</body>
</html>
