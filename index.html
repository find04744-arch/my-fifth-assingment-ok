<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Tracker - Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .hidden { display: none; }
        .issue-card-open { border-top: 5px solid #22c55e; }
        .issue-card-closed { border-top: 5px solid #9333ea; }
        
        .active-filter {
            background-color: #4f46e5 !important;
            color: white !important;
        }

        .modal-bg {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="login-area" class="min-h-screen flex items-center justify-center p-5">
        <div class="bg-white p-10 rounded-[30px] shadow-lg border border-gray-100 w-full max-w-sm text-center">
            <i class="fab fa-github text-5xl mb-5 text-gray-800"></i>
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Login to Tracker</h2>
            
            <div class="text-left space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <button onclick="startLogin()" class="w-full bg-[#4f46e5] text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 transition duration-300">Sign In</button>
            </div>
            <p class="mt-8 text-[10px] text-gray-400 font-bold uppercase tracking-widest">Demo: admin / admin123</p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-white border-b px-6 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-2 mb-4 md:mb-0">
                <i class="fab fa-github text-xl"></i>
                <span class="font-bold text-lg">GitHub Tracker</span>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="find-box" onkeyup="searchMe()" placeholder="Find issues..." class="flex-grow px-4 py-2 border rounded-lg outline-none focus:border-indigo-500">
                <button class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold text-sm">+ New</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            <div class="flex gap-2 mb-8">
                <button id="all" onclick="filterData('all')" class="active-filter px-6 py-2 rounded-lg font-bold text-xs border">All</button>
                <button id="open" onclick="filterData('open')" class="bg-white px-6 py-2 rounded-lg font-bold text-xs border text-gray-500">Open</button>
                <button id="closed" onclick="filterData('closed')" class="bg-white px-6 py-2 rounded-lg font-bold text-xs border text-gray-500">Closed</button>
            </div>

            <h3 id="info-text" class="text-xl font-bold mb-6 italic text-gray-700">Checking issues...</h3>

            <div id="card-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="item-modal" class="fixed inset-0 modal-bg hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden relative shadow-2xl">
            <button onclick="hidePopup()" class="absolute top-4 right-4 text-2xl text-gray-400 hover:text-black">&times;</button>
            <div id="modal-data" class="p-8"></div>
        </div>
    </div>

    <script>
        let myData = []; 
        function startLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;

            if (u === "admin" && p === "admin123") {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                getIssues();
            } else {
                alert("password vul dile kemne khulbe vai");
            }
        }
        async function getIssues() {
            const list = document.getElementById('card-list');
            list.innerHTML = "Fetching Data...";

            try {
                const res = await fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues');
                const result = await res.json();
                if (result.data && result.data.length > 0) {
                    myData = result.data;
                } else {
                    myData = makeFakeData();
                }
                showUI(myData);
            } catch (err) {
                console.log("Error loading API, using backup data...");
                myData = makeFakeData();
                showUI(myData);
            }
        }
        function showUI(dataArray) {
            const list = document.getElementById('card-list');
            document.getElementById('info-text').innerText = dataArray.length + " Issues Found";
            list.innerHTML = "";

            dataArray.forEach(val => {
                const isOp = val.status === 'open';
                const border = isOp ? 'issue-card-open' : 'issue-card-closed';
                
                const div = document.createElement('div');
                div.className = `bg-white p-6 rounded-2xl shadow-sm border-x border-b cursor-pointer transition hover:-translate-y-1 ${border}`;
                div.onclick = () => showPopup(val._id);

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-bold px-2 py-1 bg-red-50 text-red-500 rounded border border-red-100 uppercase">${val.priority || 'High'}</span>
                        <i class="far ${isOp ? 'fa-dot-circle text-green-500' : 'fa-check-circle text-purple-600'}"></i>
                    </div>
                    <h4 class="font-bold text-gray-800 text-sm mb-2 line-clamp-2">${val.title}</h4>
                    <p class="text-[11px] text-gray-400 mb-4 line-clamp-2">${val.description || 'No summary available.'}</p>
                    <div class="flex gap-2 mb-4">
                        <span class="bg-red-50 text-red-400 text-[8px] font-bold px-2 py-0.5 rounded border border-red-50 uppercase">BUG</span>
                        <span class="bg-orange-50 text-orange-400 text-[8px] font-bold px-2 py-0.5 rounded border border-orange-50 uppercase">HELP WANTED</span>
                    </div>
                    <div class="mt-auto pt-4 border-t flex justify-between items-center text-[10px] text-gray-400 font-bold uppercase">
                        <span>#${val._id.slice(-5)} by ${val.author}</span>
                        <span>Mar 2026</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }
        function filterData(type) {
            document.getElementById('all').className = "bg-white px-6 py-2 rounded-lg font-bold text-xs border text-gray-500";
            document.getElementById('open').className = "bg-white px-6 py-2 rounded-lg font-bold text-xs border text-gray-500";
            document.getElementById('closed').className = "bg-white px-6 py-2 rounded-lg font-bold text-xs border text-gray-500";
            document.getElementById(type).className = "active-filter px-6 py-2 rounded-lg font-bold text-xs border";

            if (type === 'all') {
                showUI(myData);
            } else {
                const filtered = myData.filter(i => i.status === type);
                showUI(filtered);
            }
        }

        function searchMe() {
            const word = document.getElementById('find-box').value.toLowerCase();
            const filtered = myData.filter(x => x.title.toLowerCase().includes(word));
            showUI(filtered);
        }

        function showPopup(id) {
            const modal = document.getElementById('item-modal');
            const box = document.getElementById('modal-data');
            const single = myData.find(x => x._id === id);

            modal.classList.replace('hidden', 'flex');
            
            box.innerHTML = `
                <h2 class="text-2xl font-bold text-gray-900 mb-2">${single.title}</h2>
                <div class="flex items-center gap-2 mb-5">
                    <span class="bg-green-500 text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase">${single.status}</span>
                    <span class="text-gray-400 text-[11px] font-bold uppercase tracking-tight">Opened by ${single.author}</span>
                </div>
                <div class="flex gap-2 mb-6">
                    <span class="bg-red-50 text-red-500 text-[9px] font-bold px-2 py-1 border border-red-100 rounded">BUG</span>
                    <span class="bg-orange-50 text-orange-500 text-[9px] font-bold px-2 py-1 border border-orange-100 rounded">HELP WANTED</span>
                </div>
                <div class="bg-gray-50 p-5 rounded-2xl mb-6 border border-gray-100 text-gray-600 text-sm leading-relaxed">
                    ${single.description}
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl border">
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">Assignee</p>
                        <p class="font-bold text-gray-700 text-sm">Fahim Ahmed</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border">
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">Priority</p>
                        <span class="bg-red-500 text-white text-[9px] px-3 py-0.5 rounded font-bold uppercase">${single.priority || 'High'}</span>
                    </div>
                </div>
                <button onclick="hidePopup()" class="w-full bg-[#4f46e5] text-white py-4 rounded-xl font-bold mt-8 shadow-lg hover:bg-indigo-700 transition">Close Details</button>
            `;
        }

        function hidePopup() {
            document.getElementById('item-modal').classList.replace('flex', 'hidden');
        }

       
        function makeFakeData() {
            let temp = [];
            for (let i = 1; i <= 50; i++) {
                temp.push({
                    _id: "id-" + i + "abcde",
                    title: "Issue number " + i + ": Please check the system performance",
                    description: "This is a dummy description for the assignment. We need to make sure the UI is pixel perfect and matches the requirements.",
                    status: i % 2 === 0 ? "open" : "closed",
                    priority: i % 3 === 0 ? "High" : "Normal",
                    author: "user_" + i
                });
            }
            return temp;
        }
    </script>
</body>
</html>
