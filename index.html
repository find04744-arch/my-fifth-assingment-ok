<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .hidden { display: none; }

       
        .issue-card-open { border-top: 4px solid #22c55e; }
        .issue-card-closed { border-top: 4px solid #9333ea; }
        
        
        .active-filter {
            background-color: #4f46e5 !important;
            color: white !important;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .modal-bg {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="login-area" class="min-h-screen flex items-center justify-center p-5">
        <div class="bg-white p-10 rounded-[30px] shadow-lg border border-gray-100 w-full max-w-sm text-center">
            <i class="fab fa-github text-5xl mb-5 text-gray-800"></i>
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Login to Tracker</h2>
            
            <div class="text-left space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <button onclick="startLogin()" class="w-full bg-[#4f46e5] text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 transition duration-300">Sign In</button>
            </div>
            <p class="mt-8 text-[10px] text-gray-400 font-bold uppercase tracking-widest">Demo: admin / admin123</p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-white border-b px-6 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-2 mb-4 md:mb-0">
                <i class="fab fa-github text-xl"></i>
                <span class="font-bold text-lg">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <div class="relative flex-grow">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400 text-xs"></i>
                    <input type="text" id="find-box" onkeyup="searchMe()" placeholder="Search issues..." class="w-full pl-9 pr-4 py-2 border rounded-lg outline-none focus:border-indigo-500 text-sm">
                </div>
                <button class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold text-sm whitespace-nowrap">+ New Issue</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            <div class="flex bg-white p-1 rounded-xl border border-gray-200 w-fit mb-8 shadow-sm">
                <button id="all" onclick="filterData('all')" class="active-filter px-8 py-2 rounded-lg font-bold text-xs transition-all">All</button>
                <button id="open" onclick="filterData('open')" class="bg-transparent px-8 py-2 rounded-lg font-bold text-xs text-gray-500 hover:text-indigo-600 transition-all">Open</button>
                <button id="closed" onclick="filterData('closed')" class="bg-transparent px-8 py-2 rounded-lg font-bold text-xs text-gray-500 hover:text-indigo-600 transition-all">Closed</button>
            </div>

            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-atom text-indigo-600"></i>
                </div>
                <div>
                    <h3 id="info-text" class="text-xl font-extrabold text-gray-800 leading-none">50 Issues</h3>
                    <p class="text-xs text-gray-400 font-medium">Track and manage your project issues</p>
                </div>
                <div class="ml-auto flex gap-4 text-[10px] font-bold uppercase tracking-tight">
                    <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500"></span> Open</span>
                    <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-purple-600"></span> Closed</span>
                </div>
            </div>

            <div id="card-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="item-modal" class="fixed inset-0 modal-bg hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden relative shadow-2xl">
            <button onclick="hidePopup()" class="absolute top-4 right-4 text-2xl text-gray-400 hover:text-black">&times;</button>
            <div id="modal-data" class="p-8"></div>
        </div>
    </div>

    <script>
        let myData = []; 

        function startLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;

            if (u === "admin" && p === "admin123") {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                getIssues();
            } else {
                alert("Invalid username or password!");
            }
        }

        async function getIssues() {
            const list = document.getElementById('card-list');
            list.innerHTML = `<div class="col-span-full text-center py-20"><i class="fas fa-spinner fa-spin text-3xl text-indigo-500"></i><p class="mt-2 text-gray-500 font-bold">Fetching Data...</p></div>`;

            try {
                const res = await fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues');
                const result = await res.json();
                
                if (result.data && Array.isArray(result.data)) {
                    myData = result.data;
                } else {
                    myData = makeFakeData();
                }
                showUI(myData);
            } catch (err) {
                console.log("Error loading API, using fallback...");
                myData = makeFakeData();
                showUI(myData);
            }
        }

        function showUI(dataArray) {
            const list = document.getElementById('card-list');
            document.getElementById('info-text').innerText = dataArray.length + " Issues";
            list.innerHTML = "";

            if(dataArray.length === 0) {
                list.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400 font-bold italic">No data found matching your criteria.</div>`;
                return;
            }

            dataArray.forEach(val => {
                const isOp = val.status === 'open';
                const borderClass = isOp ? 'issue-card-open' : 'issue-card-closed';
                const safeId = (val._id && typeof val._id === 'string') ? val._id.slice(-5) : Math.floor(Math.random() * 9000);

                const div = document.createElement('div');
                div.className = `bg-white p-6 rounded-2xl shadow-sm border border-gray-100 cursor-pointer transition hover:-translate-y-1 ${borderClass}`;
                div.onclick = () => showPopup(val._id);

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-extrabold px-2.5 py-1 bg-red-50 text-red-500 rounded-md border border-red-100 uppercase tracking-tighter">
                            ${val.priority || 'High'}
                        </span>
                        <i class="${isOp ? 'far fa-dot-circle text-green-500' : 'fas fa-check-circle text-purple-600'}"></i>
                    </div>
                    <h4 class="font-bold text-gray-800 text-sm mb-2 line-clamp-2 leading-tight">${val.title}</h4>
                    <p class="text-[11px] text-gray-400 mb-4 line-clamp-2 font-medium">${val.description || 'No summary available for this issue.'}</p>
                    <div class="flex gap-2 mb-4">
                        <span class="bg-red-50 text-red-400 text-[8px] font-bold px-2 py-0.5 rounded border border-red-50 uppercase">BUG</span>
                        <span class="bg-orange-50 text-orange-400 text-[8px] font-bold px-2 py-0.5 rounded border border-orange-50 uppercase">HELP WANTED</span>
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-50 flex justify-between items-center text-[10px] text-gray-400 font-bold uppercase">
                        <span>#${safeId} by ${val.author || 'dev_user'}</span>
                        <span>1/15/2024</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function filterData(type) {
            const btns = ['all', 'open', 'closed'];
            btns.forEach(id => {
                document.getElementById(id).className = "bg-transparent px-8 py-2 rounded-lg font-bold text-xs text-gray-500 hover:text-indigo-600 transition-all";
            });
            document.getElementById(type).classList.add('active-filter');

            if (type === 'all') {
                showUI(myData);
            } else {
                const filtered = myData.filter(i => i.status.toLowerCase() === type.toLowerCase());
                showUI(filtered);
            }
        }

        function searchMe() {
            const word = document.getElementById('find-box').value.toLowerCase();
            const filtered = myData.filter(x => x.title.toLowerCase().includes(word));
            showUI(filtered);
        }

        function showPopup(id) {
            const modal = document.getElementById('item-modal');
            const box = document.getElementById('modal-data');
            const single = myData.find(x => x._id === id);

            if(!single) return;

            modal.classList.replace('hidden', 'flex');
            
            box.innerHTML = `
                <h2 class="text-2xl font-extrabold text-gray-900 mb-2 leading-tight">${single.title}</h2>
                <div class="flex items-center gap-2 mb-5">
                    <span class="bg-${single.status === 'open' ? 'green-500' : 'purple-600'} text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase">${single.status}</span>
                    <span class="text-gray-400 text-[11px] font-bold uppercase tracking-tight">Opened by ${single.author} • 22/02/2026</span>
                </div>
                <div class="flex gap-2 mb-6">
                    <span class="bg-red-50 text-red-500 text-[9px] font-bold px-2 py-1 border border-red-100 rounded">BUG</span>
                    <span class="bg-orange-50 text-orange-500 text-[9px] font-bold px-2 py-1 border border-orange-100 rounded">HELP WANTED</span>
                </div>
                <div class="bg-gray-50 p-5 rounded-2xl mb-6 border border-gray-100 text-gray-600 text-sm leading-relaxed font-medium">
                    ${single.description}
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">Assignee</p>
                        <p class="font-bold text-gray-700 text-sm">Fahim Ahmed</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">Priority</p>
                        <span class="bg-red-500 text-white text-[9px] px-3 py-0.5 rounded font-bold uppercase">${single.priority || 'High'}</span>
                    </div>
                </div>
                <button onclick="hidePopup()" class="w-full bg-[#4f46e5] text-white py-4 rounded-xl font-bold mt-8 shadow-lg hover:bg-indigo-700 transition">Close Details</button>
            `;
        }

        function hidePopup() {
            document.getElementById('item-modal').classList.replace('flex', 'hidden');
        }

        function makeFakeData() {
            let temp = [];
            for (let i = 1; i <= 50; i++) {
                temp.push({
                    _id: "id-" + i + "abcde",
                    title: "Fix Navigation Menu On Mobile Devices",
                    description: "The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.",
                    status: i % 2 === 0 ? "open" : "closed",
                    priority: i % 3 === 0 ? "HIGH" : i % 2 === 0 ? "MEDIUM" : "LOW",
                    author: "john_doe"
                });
            }
            return temp;
        }
    </script>
</body>
</html>
