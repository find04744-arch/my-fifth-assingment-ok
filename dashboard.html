<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dashboard - Issues Tracker</title>
    <style>
        .active-tab { background: #5C00FF !important; color: white !important; border-color: #5C00FF !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-[#F8F9FA] min-h-screen pb-10">
    
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 font-bold text-lg text-gray-800">
            <div class="bg-indigo-600 p-1 rounded-md text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            </div> 
            GitHub Issues Tracker
        </div>

        <div class="flex gap-3">
            <div class="relative">
                <input 
                    type="text" 
                    id="searchInput" 
                    oninput="searchIssues()" 
                    placeholder="Search issues..." 
                    class="border border-gray-300 rounded-md pl-8 pr-4 py-1.5 text-sm w-64 focus:ring-1 focus:ring-indigo-500 outline-none shadow-sm"
                >
                <span class="absolute left-2.5 top-2 text-gray-400">🔍</span>
            </div>
            <button class="bg-[#5C00FF] text-white px-4 py-1.5 rounded-md text-sm font-medium hover:bg-indigo-700 transition">+ New Issue</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        
        <div class="bg-white border border-gray-200 p-2 rounded-lg inline-flex gap-2 mb-8 shadow-sm">
            <button onclick="changeTab('all')" id="btn-all" class="active-tab px-8 py-1.5 rounded-md text-gray-600 font-medium transition">All</button>
            <button onclick="changeTab('open')" id="btn-open" class="px-8 py-1.5 rounded-md text-gray-600 font-medium bg-gray-50 border border-gray-100 hover:bg-gray-100 transition">Open</button>
            <button onclick="changeTab('closed')" id="btn-closed" class="px-8 py-1.5 rounded-md text-gray-600 font-medium bg-gray-50 border border-gray-100 hover:bg-gray-100 transition">Closed</button>
        </div>

        <div class="bg-white border border-gray-200 rounded-t-xl p-5 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M11 17a1 1 0 001.447.894l4-2A1 1 0 0017 15V9.236a1 1 0 00-1.447-.894l-4 2a1 1 0 00-.553.894V17zM15.211 6.276l-4 2A1 1 0 0011 9.17V15a1 1 0 01-1.447.894l-4-2A1 1 0 015 13V7.236a1 1 0 01.553-.894l4-2a1 1 0 01.894 0l4 2z"></path></svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-800"><span id="count">0</span> Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm font-semibold">
                <span class="flex items-center gap-1.5 text-gray-600"><span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span> Open</span>
                <span class="flex items-center gap-1.5 text-gray-600"><span class="w-2.5 h-2.5 bg-purple-500 rounded-full"></span> Closed</span>
            </div>
        </div>

        <div id="loader" class="text-center py-20 text-indigo-600 font-bold hidden">
            <div class="animate-bounce mb-2 text-3xl">⚡</div> Loading Issues...
        </div>
        
        <div id="issueGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 bg-white border-x border-b border-gray-200 p-6 rounded-b-xl shadow-sm min-h-[300px]">
            </div>
    </main>

    <div id="modalOverlay" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-2xl p-8 relative shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-2xl text-gray-400 hover:text-gray-600">&times;</button>
            <div id="modalBody"></div>
            <div class="mt-8 flex justify-end">
                <button onclick="closeModal()" class="bg-[#5C00FF] text-white px-8 py-2 rounded-lg font-bold hover:bg-indigo-700 transition">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
